# ═══════════════════════════════════════════════════════════════════
#  HXTP JS SDK — CI & Publish Pipeline
#
#  • Lint, typecheck, test on every push/PR
#  • Build and publish to NPM on push to main
#  • Auto-detects version from package.json
#  • Creates a GitHub Release with the published version
#
#  Copyright (c) 2026 Hestia Labs
# ═══════════════════════════════════════════════════════════════════

name: SDK JS — Build & Publish

on:
    push:
        branches: [main]
        paths:
            - "src/**"
            - "tests/**"
            - "package.json"
            - "tsconfig.json"
            - "tsup.config.ts"
            - "vitest.config.ts"
            - "bun.lock"
            - ".github/workflows/npm-publish.yml"
    pull_request:
        branches: [main]
        paths:
            - "src/**"
            - "tests/**"
            - "package.json"
            - "tsconfig.json"
            - "tsup.config.ts"
            - "vitest.config.ts"
            - "bun.lock"
            - ".github/workflows/npm-publish.yml"

jobs:
    # ── CI: Lint, Typecheck, Test ────────────────────────────────────
    ci:
        name: CI
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Lint
              run: bun run lint

            - name: Typecheck
              run: bun run typecheck

            - name: Test
              run: bun run test

    # ── Build & Publish to NPM ───────────────────────────
    publish:
        name: Publish to NPM
        needs: ci
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build
              run: bun run build

            - name: Read package version
              id: version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Detected version: $VERSION"

            - name: Check if version already published
              id: check
              run: |
                  PACKAGE_NAME=$(node -p "require('./package.json').name")
                  VERSION="${{ steps.version.outputs.version }}"

                  if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org 2>/dev/null; then
                    echo "already_published=true" >> "$GITHUB_OUTPUT"
                    echo "Version ${VERSION} is already published — skipping publish."
                  else
                    echo "already_published=false" >> "$GITHUB_OUTPUT"
                    echo "Version ${VERSION} not yet published — will publish."
                  fi

            - name: Publish to NPM
              if: steps.check.outputs.already_published == 'false'
              run: bun publish --access public
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create GitHub Release
              if: steps.check.outputs.already_published == 'false'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: js-${{ steps.version.outputs.tag }}
                  name: "hxtp-js ${{ steps.version.outputs.tag }}"
                  body: |
                      ## @hestialabs/hxtp-js ${{ steps.version.outputs.tag }}

                      Published to [NPM](https://www.npmjs.com/package/@hestialabs/hxtp-js).

                      ### Install

                      ```bash
                      npm install @hestialabs/hxtp-js@${{ steps.version.outputs.version }}
                      ```

                      ---
                      Commit: `${{ github.sha }}`
                  make_latest: false
