# ═══════════════════════════════════════════════════════════════════
#  HXTP JS SDK — CI & Auto-Publish Pipeline
#
#  • Runs CI (Lint, Test, Typecheck) on all PRs and pushes to main.
#  • Auto-publishes to NPM and GitHub Releases on version tags (v*).
#  • Uses Bun for high-performance builds and installation.
#
#  Copyright (c) 2026 Hestia Labs
# ═══════════════════════════════════════════════════════════════════

name: CI & Publish

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ── CI: Quality Gates ───────────────────────────────────────────
  ci:
    name: CI (Lint, Typecheck, Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  release:
    name: Release
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        run: bun run build

      - name: Check if version already published
        id: check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already published — skipping NPM publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} not yet published — will publish."
          fi

      - name: Configure NPM Authentication
        if: steps.check.outputs.already_published == 'false'
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM (Trusted Publishing)
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "hxtp-js ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## @hestialabs/hxtp-js ${{ github.ref_name }}

            Official HxTP/3.0 Client SDK for JavaScript and TypeScript.

            ### Install
            ```bash
            bun add @hestialabs/hxtp-js
            ```
          make_latest: true